<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>خمسات سنايبر</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 320px;
      background: var(--color-bg);
      color: var(--color-text-primary);
      font-family: 'IBM Plex Sans Arabic', 'Segoe UI', system-ui, sans-serif;
      direction: rtl;
      text-align: right;
      overflow: hidden;
    }

    /* ── Header ── */
    .popup-header {
      background: var(--color-surface-elevated);
      padding: 16px 18px 14px;
      border-bottom: 1px solid var(--color-border);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .popup-logo {
      width: 38px;
      height: 38px;
      background: var(--color-accent-dim);
      border: 1px solid var(--color-border-accent);
      border-radius: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .popup-logo svg {
      color: var(--color-accent);
    }

    .popup-header-text {
      flex: 1;
      min-width: 0;
    }

    .popup-header-text h1 {
      font-size: 14px;
      font-weight: 700;
      color: var(--color-text-primary);
      letter-spacing: -0.01em;
      line-height: 1.2;
    }

    .popup-header-text .tagline {
      font-size: 10px;
      color: var(--color-text-tertiary);
      margin-top: 2px;
      letter-spacing: 0.03em;
    }

    .popup-status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--color-accent);
      box-shadow: 0 0 6px var(--color-accent-glow);
      flex-shrink: 0;
      transition: background 0.3s;
    }

    .popup-status-dot.off {
      background: var(--color-text-tertiary);
      box-shadow: none;
    }

    /* ── Body ── */
    .popup-body {
      padding: 16px 18px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* ── Stat card ── */
    .stat-card {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: 0;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .stat-card-label {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .stat-card-label span:first-child {
      font-size: 10px;
      font-weight: 600;
      color: var(--color-text-tertiary);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .stat-card-label span:last-child {
      font-size: 11px;
      color: var(--color-text-tertiary);
    }

    .stat-card-value {
      font-size: 32px;
      font-weight: 700;
      color: var(--color-accent);
      letter-spacing: -0.03em;
      font-variant-numeric: tabular-nums;
      line-height: 1;
    }

    /* ── Divider ── */
    .divider {
      height: 1px;
      background: var(--color-border);
      margin: 0 -18px;
      width: calc(100% + 36px);
    }

    /* ── Toggle row ── */
    .toggle-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: 0;
      padding: 12px 14px;
      transition: border-color 0.3s var(--ease-expo);
      cursor: pointer;
    }

    .toggle-row:hover {
      border-color: var(--color-border-accent);
    }

    .toggle-label-group {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .toggle-icon {
      width: 28px;
      height: 28px;
      background: var(--color-surface-elevated);
      border-radius: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .toggle-label-text {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .toggle-label-text span:first-child {
      font-size: 13px;
      font-weight: 500;
      color: var(--color-text-primary);
    }

    .toggle-label-text span:last-child {
      font-size: 10px;
      color: var(--color-text-tertiary);
    }

    /* ── Toggle switch ── */
    .toggle {
      position: relative;
      width: 40px;
      height: 22px;
      flex-shrink: 0;
    }

    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
      position: absolute;
    }

    .toggle-slider {
      position: absolute;
      cursor: pointer;
      inset: 0;
      background: var(--color-surface-elevated);
      border: 1px solid var(--color-border);
      border-radius: 0;
      transition: all 0.35s var(--ease-expo);
    }

    .toggle-slider:before {
      content: "";
      position: absolute;
      height: 16px;
      width: 16px;
      right: 2px;
      bottom: 2px;
      background: var(--color-text-tertiary);
      border-radius: 0;
      transition: all 0.35s var(--ease-expo);
    }

    .toggle input:checked + .toggle-slider {
      background: var(--color-accent);
      border-color: var(--color-accent);
    }

    .toggle input:checked + .toggle-slider:before {
      transform: translateX(-18px);
      background: var(--color-bg);
    }

    .toggle input:focus-visible + .toggle-slider {
      box-shadow: 0 0 0 3px var(--color-accent-dim);
    }

    /* ── Buttons ── */
    .btn-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 0;
      cursor: pointer;
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.01em;
      transition: all 0.3s var(--ease-expo);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-primary {
      background: var(--color-accent);
      color: var(--color-bg);
    }

    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 24px var(--color-accent-glow);
    }

    .btn-primary:active {
      transform: translateY(0);
      box-shadow: none;
    }

    .btn-secondary {
      background: var(--color-surface);
      color: var(--color-text-secondary);
      border: 1px solid var(--color-border);
    }

    .btn-secondary:hover {
      background: var(--color-surface-elevated);
      color: var(--color-text-primary);
      border-color: var(--color-border-accent);
    }

    .btn:focus-visible {
      outline: 2px solid var(--color-accent);
      outline-offset: 2px;
    }

    .btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none !important;
      box-shadow: none !important;
    }

    /* ── Status toast ── */
    .status-toast {
      font-size: 12px;
      padding: 9px 13px;
      border-radius: 0;
      display: none;
      font-weight: 500;
      letter-spacing: 0.01em;
      text-align: center;
    }

    .status-toast.success {
      display: block;
      background: var(--color-accent-dim);
      color: var(--color-accent);
      border: 1px solid var(--color-border-accent);
    }

    .status-toast.error {
      display: block;
      background: rgba(255, 35, 35, 0.08);
      color: var(--color-error);
      border: 1px solid rgba(255, 35, 35, 0.15);
    }

    /* ── Footer ── */
    .popup-footer {
      padding: 10px 18px;
      border-top: 1px solid var(--color-border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .footer-version {
      font-size: 10px;
      color: var(--color-text-tertiary);
      letter-spacing: 0.04em;
    }

    .footer-link {
      font-size: 10px;
      color: var(--color-accent);
      text-decoration: none;
      letter-spacing: 0.02em;
      opacity: 0.7;
      transition: opacity 0.2s;
      cursor: pointer;
      background: none;
      border: none;
      font-family: inherit;
    }

    .footer-link:hover {
      opacity: 1;
    }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="popup-header">
    <div class="popup-logo">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/>
        <circle cx="12" cy="12" r="4"/>
        <line x1="21.17" y1="8" x2="12" y2="8"/>
        <line x1="3.95" y1="6.06" x2="8.54" y2="14"/>
        <line x1="10.88" y1="21.94" x2="15.46" y2="14"/>
      </svg>
    </div>
    <div class="popup-header-text">
      <h1>خمسات سنايبر</h1>
      <div class="tagline">مساعد عروض خمسات بالذكاء الاصطناعي</div>
    </div>
    <div class="popup-status-dot" id="statusDot" title="المراقبة نشطة"></div>
  </div>

  <!-- Body -->
  <div class="popup-body">

    <!-- Stat card -->
    <div class="stat-card">
      <div class="stat-card-label">
        <span>المطابقات</span>
        <span>اليوم</span>
      </div>
      <span class="stat-card-value" id="matchCount">0</span>
    </div>

    <!-- Auto scan toggle -->
    <div class="toggle-row" id="toggleRow">
      <div class="toggle-label-group">
        <div class="toggle-icon">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--color-accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </div>
        <div class="toggle-label-text">
          <span>الفحص التلقائي</span>
          <span>مراجعة الطلبات الجديدة تلقائياً</span>
        </div>
      </div>
      <label class="toggle" onclick="event.stopPropagation()">
        <input type="checkbox" id="monitoringToggle" checked>
        <span class="toggle-slider"></span>
      </label>
    </div>

    <!-- Buttons -->
    <div class="btn-group">
      <button class="btn btn-primary" id="checkNowBtn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        افتح خمسات
      </button>
      <button class="btn btn-secondary" id="openOptions">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
        الإعدادات
      </button>
    </div>

    <!-- Status toast -->
    <div class="status-toast" id="status"></div>

  </div>

  <!-- Footer -->
  <div class="popup-footer">
    <span class="footer-version">v1.0.0</span>
    <button class="footer-link" id="openOptions2">الإعدادات والمزودين</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
